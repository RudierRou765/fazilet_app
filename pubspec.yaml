name: fazilet_app
description: Fazilet App - Prayer Times, Qibla, Ilmihal
publish_to: 'none'
version: 1.0.16+17

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI ve Temel Paketler
  google_fonts: ^6.1.0
  intl: ^0.19.0

  # Sensörler ve Konum (Kıble ve Vakit Hesaplama)
  sensors_plus: ^5.0.0
  geolocator: ^11.0.0
  geocoding: ^2.1.1
  adhan: ^2.0.0+1

  # Yerel Veritabanı ve Depolama
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Reklamlar
  google_mobile_ads: ^4.0.0

  # Ses ve Medya (Kuran Okumaları)
  just_audio: ^0.9.36
  audio_video_progress_bar: ^2.0.1
  rxdart: ^0.27.7
  dio: ^5.4.1
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
